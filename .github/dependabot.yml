version: 2
updates:
  # Python 依存関係 (uv / pyproject.toml・uv.lock)
  - package-ecosystem: "uv"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "monday"
    open-pull-requests-limit: 10
    commit-message:
      prefix: "chore"
      include: "scope"
    labels:
      - "dependencies"
      - "python"
    groups:
      python-deps-patch:
        update-types: ["patch"]
      python-deps-minor:
        update-types: ["minor"]
      # major は個別 PR（破壊的変更のため手動レビュー必須）

  # GitHub Actions（ワークフロー内の action バージョン）
  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "monday"
    open-pull-requests-limit: 10
    commit-message:
      prefix: "ci"
      include: "scope"
    labels:
      - "dependencies"
      - "github-actions"
    groups:
      actions-patch:
        update-types: ["patch"]
      actions-minor:
        update-types: ["minor"]
      # major は個別 PR（破壊的変更のため手動レビュー必須）
