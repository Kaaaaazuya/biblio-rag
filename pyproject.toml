[project]
name = "biblio-rag"
version = "0.1.0"
description = "日本語書籍 RAG パイプライン — PDF→抽出→チャンク→埋め込み→pgvector→検索 の取り込みパイプライン"
readme = "README.md"
requires-python = ">=3.14"
dependencies = [
    "pymupdf>=1.27.2.3",
]

[dependency-groups]
dev = [
    "pytest>=9.1.0",
    "reportlab>=4.5.1",
]

[tool.pytest.ini_options]
testpaths = ["tests"]
