# 開発環境: pgvector(PostgreSQL) + Ollama
# 起動: docker compose -f docker/docker-compose.yml up -d
# 認証情報はリポジトリ root の .env から読み込む（env_file）。
#
# 注意(macOS): Docker 内 Ollama は Apple GPU(Metal) を使えず CPU 動作になる。
#   brew 版 Ollama を起動していると 11434 ポートが衝突するため、
#   docker 版を使う間は native Ollama を停止すること（README 参照）。

services:
  db:
    image: pgvector/pgvector:pg17
    container_name: biblio-db
    restart: unless-stopped
    env_file:
      - ../.env
    ports:
      - "127.0.0.1:5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
      # スキーマは初回起動（データ空）時に自動適用される
      - ../infra/db:/docker-entrypoint-initdb.d:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $${POSTGRES_USER} -d $${POSTGRES_DB}"]
      interval: 5s
      timeout: 5s
      retries: 10

  ollama:
    image: ollama/ollama:0.6.8
    container_name: biblio-ollama
    restart: unless-stopped
    ports:
      - "127.0.0.1:11434:11434"
    volumes:
      - ollama:/root/.ollama
    healthcheck:
      test: ["CMD-SHELL", "ollama list >/dev/null 2>&1 || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 10

  # 開発用オブジェクトストレージ（S3 互換）。本番は AWS S3。
  minio:
    image: minio/minio:RELEASE.2024-12-13T22-52-09Z
    container_name: biblio-minio
    restart: unless-stopped
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
      # ブラウザから presigned URL で直接 PUT できるよう CORS を許可（開発用）
      MINIO_API_CORS_ALLOW_ORIGIN: "*"
    ports:
      - "127.0.0.1:9000:9000"   # S3 API エンドポイント
      - "127.0.0.1:9001:9001"   # 管理コンソール（http://localhost:9001）
    volumes:
      - minio:/data

  # 2nd ステージ用のローカル AWS（S3 + SQS + Lambda）。Terraform でリソースを作る。
  # Lambda は LocalStack が Docker コンテナとして spawn する（要 docker.sock）。
  # spawn される Lambda は LAMBDA_DOCKER_NETWORK で本 compose 網に参加し、
  # db(pgvector) / ollama / localstack をサービス名で解決できる。
  localstack:
    # community 版を固定（:latest は Pro ライセンストークンを要求して起動失敗する）。
    # S3 / SQS / Lambda はいずれも community で利用可能。
    image: localstack/localstack:3.8
    container_name: biblio-localstack
    restart: unless-stopped
    ports:
      - "127.0.0.1:4566:4566"
    environment:
      # SERVICES は絞らない（lambda が依存する iam/sts も community で必要）。
      LAMBDA_DOCKER_NETWORK: "biblio-net"
      DEBUG: "1"
    volumes:
      - "/var/run/docker.sock:/var/run/docker.sock"

  # 起動時にバケットを作る一度きりのジョブ（mc）。作成後に exit 0。
  createbuckets:
    image: minio/mc:RELEASE.2024-12-13T22-52-09Z
    container_name: biblio-createbuckets
    depends_on:
      - minio
    entrypoint: >
      /bin/sh -c "
      until mc alias set local http://minio:9000 minioadmin minioadmin; do echo 'waiting for minio'; sleep 1; done;
      mc mb --ignore-existing local/biblio;
      echo 'bucket ready';
      exit 0;
      "

volumes:
  pgdata:
  ollama:
  minio:

# 既定ネットワークを固定名にする（LocalStack の LAMBDA_DOCKER_NETWORK と一致させるため）。
networks:
  default:
    name: biblio-net
