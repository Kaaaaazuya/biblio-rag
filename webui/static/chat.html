<!doctype html>
<html lang="ja">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>biblio-rag · チャット</title>
    <link rel="stylesheet" href="/style.css" />
    <style>
      /* チャット専用レイアウト */
      body {
        align-items: stretch;
        padding: 0;
        height: 100vh;
      }

      .chat-layout {
        display: flex;
        flex-direction: column;
        width: 100%;
        max-width: 720px;
        height: 100vh;
        margin: 0 auto;
        background: var(--bg-card);
        border-inline: 1px solid var(--border);
      }

      .chat-header {
        padding: 16px 24px;
        border-bottom: 1px solid var(--border);
        display: flex;
        align-items: center;
        gap: 12px;
      }

      .chat-header h1 {
        font-size: 17px;
        margin: 0;
      }

      .chat-header a {
        font-size: 13px;
        color: var(--text-sub);
        text-decoration: none;
      }
      .chat-header a:hover { color: var(--accent); }

      .header-actions {
        margin-left: auto;
        display: flex;
        align-items: center;
        gap: 10px;
      }

      #persona-select,
      #book-select {
        font-size: 12px;
        padding: 4px 8px;
        border: 1px solid var(--border);
        border-radius: 8px;
        background: var(--bg-input);
        color: var(--text-main);
        cursor: pointer;
        outline: none;
        max-width: 140px;
      }

      #clear-btn {
        font-size: 12px;
        color: var(--text-sub);
        background: none;
        border: none;
        cursor: pointer;
        padding: 0;
      }
      #clear-btn:hover { color: var(--error); }

      /* メッセージリスト */
      .messages {
        flex: 1;
        overflow-y: auto;
        padding: 24px 24px 8px;
        display: flex;
        flex-direction: column;
        gap: 20px;
      }

      .message {
        display: flex;
        flex-direction: column;
        gap: 4px;
        max-width: 85%;
      }

      .message.user { align-self: flex-end; align-items: flex-end; }
      .message.assistant { align-self: flex-start; align-items: flex-start; }

      .bubble {
        padding: 12px 16px;
        border-radius: 16px;
        font-size: 14px;
        line-height: 1.65;
        white-space: pre-wrap;
        word-break: break-word;
      }

      .message.user .bubble {
        background: var(--accent);
        color: #04201a;
        border-bottom-right-radius: 4px;
      }

      .message.assistant .bubble {
        background: var(--bg-input);
        border: 1px solid var(--border);
        color: var(--text-main);
        border-bottom-left-radius: 4px;
      }

      .bubble[data-error] {
        border-color: var(--error);
        color: var(--error);
      }

      /* ローディングスピナー（バブル内） */
      .bubble .spinner {
        display: inline-block;
        width: 14px;
        height: 14px;
        border: 2px solid var(--border);
        border-top-color: var(--accent);
        border-radius: 50%;
        animation: spin .7s linear infinite;
        vertical-align: middle;
      }

      @keyframes spin { to { transform: rotate(360deg); } }

      /* 送信ボタン ローディング時 */
      #send-btn.loading {
        background: var(--bg-input);
        pointer-events: none;
      }
      #send-btn.loading::before {
        content: "";
        display: block;
        width: 16px;
        height: 16px;
        border: 2px solid var(--border);
        border-top-color: var(--accent);
        border-radius: 50%;
        animation: spin .7s linear infinite;
      }

      /* ソースチップ */
      .sources {
        font-size: 12px;
        color: var(--text-sub);
        display: flex;
        flex-wrap: wrap;
        gap: 6px;
        padding: 0 4px;
      }

      .source-chip {
        background: var(--bg-input);
        border: 1px solid var(--border);
        border-radius: 6px;
        padding: 2px 8px;
        cursor: pointer;
        transition: border-color .15s;
        user-select: none;
      }
      .source-chip:hover { border-color: var(--accent); }

      /* ソースモーダル */
      .modal-overlay {
        position: fixed;
        inset: 0;
        background: rgba(0,0,0,.5);
        display: flex;
        align-items: center;
        justify-content: center;
        padding: 24px;
        z-index: 100;
      }
      .modal-overlay[hidden] { display: none; }

      .modal {
        background: var(--bg-card);
        border: 1px solid var(--border);
        border-radius: 16px;
        width: 100%;
        max-width: 560px;
        max-height: 70vh;
        display: flex;
        flex-direction: column;
        box-shadow: 0 8px 40px rgba(0,0,0,.3);
      }

      .modal-header {
        display: flex;
        align-items: flex-start;
        gap: 12px;
        padding: 16px 20px;
        border-bottom: 1px solid var(--border);
      }

      .modal-meta {
        flex: 1;
        font-size: 13px;
        line-height: 1.5;
      }

      .modal-meta strong { display: block; font-size: 14px; }
      .modal-meta span   { color: var(--text-sub); }

      .modal-close {
        flex-shrink: 0;
        background: none;
        border: none;
        color: var(--text-sub);
        font-size: 18px;
        cursor: pointer;
        padding: 0;
        line-height: 1;
      }
      .modal-close:hover { color: var(--text-main); }

      .modal-body {
        padding: 16px 20px;
        overflow-y: auto;
        font-size: 13px;
        line-height: 1.8;
        color: var(--text-main);
        white-space: pre-wrap;
        word-break: break-word;
      }

      /* 入力エリア */
      .input-area {
        padding: 16px 24px;
        border-top: 1px solid var(--border);
      }

      .input-row {
        display: flex;
        gap: 10px;
        align-items: flex-end;
      }

      textarea#query {
        flex: 1;
        padding: 10px 14px;
        border: 1px solid var(--border);
        border-radius: 12px;
        font-size: 14px;
        font-family: inherit;
        background: var(--bg-input);
        color: var(--text-main);
        outline: none;
        resize: none;
        line-height: 1.5;
        max-height: 140px;
        overflow-y: auto;
        transition: border-color .15s, box-shadow .15s;
      }

      textarea#query:focus {
        border-color: var(--accent);
        box-shadow: 0 0 0 3px rgba(0,200,150,.15);
      }

      #send-btn {
        flex-shrink: 0;
        width: 40px;
        height: 40px;
        border: none;
        border-radius: 10px;
        background: var(--accent);
        color: #04201a;
        font-size: 18px;
        cursor: pointer;
        display: flex;
        align-items: center;
        justify-content: center;
        transition: background .15s, opacity .15s;
      }

      #send-btn:hover:not(:disabled) { background: var(--accent-hover); }
      #send-btn:disabled { opacity: .45; cursor: not-allowed; }

      /* Abort button (shown while streaming) */
      #abort-btn {
        flex-shrink: 0;
        width: 40px;
        height: 40px;
        border: 1px solid var(--border);
        border-radius: 10px;
        background: var(--bg-input);
        color: var(--text-main);
        font-size: 18px;
        cursor: pointer;
        display: none;
        align-items: center;
        justify-content: center;
        transition: background .15s, border-color .15s;
      }

      #abort-btn:hover {
        background: var(--bg-page);
        border-color: var(--accent);
      }

      #abort-btn.visible { display: flex; }

      .hint {
        margin-top: 6px;
        font-size: 11px;
        color: var(--text-sub);
        text-align: right;
      }

      /* Markdown レンダリング済みバブル */
      .bubble.rendered { white-space: normal; }
      .bubble.rendered p { margin: 0 0 .6em; }
      .bubble.rendered p:last-child { margin-bottom: 0; }
      .bubble.rendered ul,
      .bubble.rendered ol { padding-left: 1.4em; margin: .4em 0; }
      .bubble.rendered li { margin: .2em 0; }
      .bubble.rendered code {
        font-family: ui-monospace, "SF Mono", monospace;
        font-size: .85em;
        background: rgba(128,128,128,.15);
        padding: 1px 5px;
        border-radius: 4px;
      }
      .bubble.rendered pre {
        background: var(--bg-page);
        border: 1px solid var(--border);
        border-radius: 8px;
        padding: 12px;
        overflow-x: auto;
        margin: .5em 0;
      }
      .bubble.rendered pre code { background: none; padding: 0; font-size: 13px; }
      .bubble.rendered h1,
      .bubble.rendered h2,
      .bubble.rendered h3 { font-weight: 700; margin: .8em 0 .3em; line-height: 1.3; }

      /* 空状態 */
      .empty-state {
        flex: 1;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        gap: 8px;
        color: var(--text-sub);
        font-size: 14px;
        pointer-events: none;
      }

      .empty-state .icon { font-size: 36px; }
    </style>
  </head>
  <body>
    <div class="chat-layout">
      <header class="chat-header">
        <h1>biblio-rag チャット</h1>
        <div class="header-actions">
          <select id="book-select" title="対象書籍">
            <option value="">📚 全書籍</option>
          </select>
          <select id="lang-select" title="言語">
            <option value="ja">🇯🇵 日本語</option>
            <option value="en">🇺🇸 English</option>
          </select>
          <select id="persona-select" title="会話スタイル">
            <option value="">🤖 デフォルト</option>
            <option value="senior">👨‍💼 優しい先輩</option>
            <option value="strict">📐 厳しい先生</option>
            <option value="simple">📖 やさしく説明</option>
          </select>
          <button id="clear-btn" title="履歴をクリア">🗑 クリア</button>
          <a href="/">アップロード</a>
        </div>
      </header>

      <div class="messages" id="messages">
        <div class="empty-state" id="empty">
          <span class="icon">📚</span>
          <span>取り込み済みの書籍について質問できます</span>
        </div>
      </div>

      <div class="input-area">
        <div class="input-row">
          <textarea id="query" rows="1" placeholder="質問を入力"></textarea>
          <button id="send-btn" title="送信">↑</button>
          <button id="abort-btn" title="キャンセル">✕</button>
        </div>
        <p class="hint">ボタンまたは Shift+Enter で送信</p>
      </div>
    </div>

    <!-- ソース原文モーダル -->
    <div id="source-modal" class="modal-overlay" hidden>
      <div class="modal">
        <div class="modal-header">
          <div class="modal-meta">
            <strong id="modal-title"></strong>
            <span id="modal-sub"></span>
          </div>
          <button class="modal-close" id="modal-close">✕</button>
        </div>
        <div class="modal-body" id="modal-body"></div>
      </div>
    </div>

    <script src="/lib/marked.min.js"></script>
    <!-- DOMPurify for XSS protection -->
    <script src="https://cdn.jsdelivr.net/npm/dompurify@3.0.6/dist/purify.min.js" integrity="sha384-mfbCq1xrGzDDH3V3xRFB8kpD5K2QHMcJqMvWnxc9Y7vMVHxwL5hv6iFvpUj6L0FU" crossorigin="anonymous"></script>
    <script src="/chat.js"></script>
  </body>
</html>
